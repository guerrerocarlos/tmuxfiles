set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g detach-on-destroy off
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
setw -g xterm-keys on
set -g focus-events on
set -s escape-time 0

# Open new windows and panes in the current pane's working directory.
bind-key c new-window -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"

# Reload this config quickly.
bind-key R source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

# Hide pane borders and pane border headers.
set -g pane-border-status off
setw -g pane-border-lines spaces

# Show the active pane path for each window in the status line.
set -g window-status-format " #I:#W#F #{=/32/...:#{pane_current_path}} "
set -g window-status-current-format " #I:#W#F #{=/40/...:#{pane_current_path}} "

# Show pane paths in the session/window picker.
bind-key s choose-tree -Zs -F "#{?session_format,#{session_name}: #{session_windows} windows,window_format,#{window_index}: #{window_name}#{window_flags} #{=/64/...:#{pane_current_path}},#{pane_index}: #{pane_current_command} #{pane_current_path}}"
bind-key w choose-tree -Zw -F "#{?session_format,#{session_name}: #{session_windows} windows,window_format,#{window_index}: #{window_name}#{window_flags} #{=/64/...:#{pane_current_path}},#{pane_index}: #{pane_current_command} #{pane_current_path}}"

# Keep pane layouts stable when terminals have different sizes.
setw -g aggressive-resize on
# Enable clipboard sync (OSC 52)
set -s set-clipboard on

# For vi-style yanking to system clipboard
setw -g mode-keys vi
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
